services:
  mysql:
    image: mysql:9.3
    container_name: smart-city-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Subbu@895
      MYSQL_DATABASE: smartcity_minimal
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pSubbu@895"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - smart-city-mysql-data:/var/lib/mysql

  app:
    build:
      context: .
    container_name: smart-city-app
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartcity_minimal
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Subbu@895
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_AUTH_GOOGLE_CLIENT_ID: ${APP_AUTH_GOOGLE_CLIENT_ID}
      APP_MAPS_GOOGLE_API_KEY: ${APP_MAPS_GOOGLE_API_KEY}
      APP_MAIL_FROM: ${APP_MAIL_FROM}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
    ports:
      - "8080:8080"

volumes:
  smart-city-mysql-data:
