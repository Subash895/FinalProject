services:
  mysql:
    image: mysql:9.3
    container_name: smart-city-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Subbu@895
      MYSQL_DATABASE: smartcity_minimal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pSubbu@895"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - smart-city-mysql-data:/var/lib/mysql

  app:
    build:
      context: .
    container_name: smart-city-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartcity_minimal
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Subbu@895
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"

volumes:
  smart-city-mysql-data:
