<!DOCTYPE html>
<html>
<head>
    <title>Create Business</title>
</head>
<body>

<h2>Create Business</h2>

<input id="name" placeholder="Name"><br><br>
<input id="category" placeholder="Category"><br><br>
<input id="address" placeholder="Address"><br><br>
<input id="cityId" placeholder="City ID"><br><br>

<button onclick="createBusiness()">Create</button>

<script>
async function createBusiness() {

    const token = localStorage.getItem("token"); // JWT stored after login

    const data = {
        name: document.getElementById("name").value,
        category: document.getElementById("category").value,
        address: document.getElementById("address").value,
        cityId: parseInt(document.getElementById("cityId").value)
    };

    const res = await fetch("http://localhost:8081/api/business", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    console.log(result);
    alert(result.message);
}
</script>

</body>
</html>
