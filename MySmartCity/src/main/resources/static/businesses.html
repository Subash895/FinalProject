<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Business Page</title>
</head>

<body>

	<div id="error" style="color: red; margin-top: 10px;"></div>

	<h2>Add Business</h2>

	<form id="businessForm">
		<input type="text" id="name" placeholder="Name" required /> <input
			type="text" id="category" placeholder="Category" required /> <input
			type="text" id="address" placeholder="Address" required /> <input
			type="number" id="userId" placeholder="User ID" required />
		<button type="submit">Add Business</button>
	</form>

	<hr>

	<!-- 🔥 ADD THIS SECTION -->
	<h3>Search / Filter Businesses</h3>

	<input type="text" id="searchName" placeholder="Search by name">
	<input type="text" id="searchCategory" placeholder="Filter by category">
	<button onclick="loadBusinesses()">Search</button>

	<hr>

	<h3>Business List</h3>
	<div id="list"></div>

	<script src="/js/business.js"></script>

</body>
</html>
