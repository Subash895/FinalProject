<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySmartCity - Register</title>
  <link rel="icon" type="image/x-icon" href="images/subash.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

  <div class="auth-page">
    <a href="index.html" class="auth-logo">
      <div class="logo-icon">SC</div>
      My<span>Smart</span>City
    </a>

    <div class="auth-card glass-card">
      <div class="auth-card-header">
        <div class="auth-icon">UP</div>
        <h1>Join SmartCity</h1>
        <p>Create your free account today</p>
      </div>

      <div id="registerError" class="auth-error"></div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input class="form-control" id="name" type="text" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input class="form-control" id="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-field">
            <input class="form-control" id="password" type="password" placeholder="Minimum 8 characters" required>
            <button type="button" class="password-toggle" data-password-toggle data-target="password" aria-label="Show password" aria-pressed="false">Show</button>
          </div>
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <div class="role-selector">
            <label class="role-option">
              <input type="radio" name="role" value="USER" checked>
              <span class="role-card">
                <span class="role-icon">U</span>
                <span class="role-info">
                  <span class="role-name">User</span>
                  <span class="role-desc">View city data, comment, and add businesses</span>
                </span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="BUSINESS">
              <span class="role-card">
                <span class="role-icon">B</span>
                <span class="role-info">
                  <span class="role-name">Business</span>
                  <span class="role-desc">Everything in User plus business and forum tools</span>
                </span>
              </span>
            </label>
          </div>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <div class="google-auth-section">
        <div id="registerGoogleError" class="auth-error"></div>
        <div id="registerGoogleButton" class="google-auth-button"></div>
      </div>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    const registerPasswordToggleButtons = Array.from(document.querySelectorAll("[data-password-toggle]"));

    function setRegisterPasswordVisibility(input, button, visible) {
      input.type = visible ? "text" : "password";
      button.textContent = visible ? "Hide" : "Show";
      button.setAttribute("aria-label", visible ? "Hide password" : "Show password");
      button.setAttribute("aria-pressed", visible ? "true" : "false");
    }

    registerPasswordToggleButtons.forEach((button) => {
      const targetId = button.dataset.target;
      const input = document.getElementById(targetId);
      if (!input) {
        return;
      }

      let pinnedVisible = false;

      button.addEventListener("pointerdown", () => {
        if (!pinnedVisible) {
          setRegisterPasswordVisibility(input, button, true);
        }
      });

      ["pointerup", "pointerleave", "pointercancel"].forEach((eventName) => {
        button.addEventListener(eventName, () => {
          if (!pinnedVisible) {
            setRegisterPasswordVisibility(input, button, false);
          }
        });
      });

      button.addEventListener("click", () => {
        pinnedVisible = !pinnedVisible;
        setRegisterPasswordVisibility(input, button, pinnedVisible);
      });

      input.addEventListener("blur", () => {
        if (!pinnedVisible) {
          setRegisterPasswordVisibility(input, button, false);
        }
      });
    });

    if (isLoggedIn()) window.location.href = "index.html";

    document.getElementById("registerForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const errorElement = document.getElementById("registerError");
      errorElement.classList.remove("show");
      const role = document.querySelector('input[name="role"]:checked')?.value || "USER";

      registerUser(
        document.getElementById("name").value.trim(),
        document.getElementById("email").value.trim(),
        document.getElementById("password").value,
        role
      ).catch((error) => {
        errorElement.textContent = error.message || "Registration failed. Please try again.";
        errorElement.classList.add("show");
      });
    });

    function showRegisterGoogleError(message) {
      const errorElement = document.getElementById("registerGoogleError");
      errorElement.textContent = message;
      errorElement.classList.add("show");
    }

    setupGoogleAuthButton("registerGoogleButton", {
      mode: "signup",
      buttonText: "signup_with",
      getRole: () => document.querySelector('input[name="role"]:checked')?.value || "USER",
      onError: (error) => {
        showRegisterGoogleError(error.message || "Google sign-up failed.");
      }
    }).catch((error) => {
      showRegisterGoogleError(error.message || "Google sign-up failed.");
    });

  </script>

</body>

</html>
