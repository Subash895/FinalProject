<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySmartCity - Forum</title>
  <link rel="icon" type="image/x-icon" href="images/subash.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/forum.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon">SC</div>
      My<span>Smart</span>City
    </a>
    <ul class="navbar-nav">
      <li><a href="city.html"><span class="nav-icon">🏛️</span>Cities</a></li>
      <li><a href="business.html"><span class="nav-icon">💼</span>Business</a></li>
      <li><a href="place.html"><span class="nav-icon">📍</span>Places</a></li>
      <li><a href="forum.html" class="active"><span class="nav-icon">💬</span>Forum</a></li>
      <li><a href="news.html"><span class="nav-icon">📰</span>News</a></li>
      <li><a href="subscription.html"><span class="nav-icon">⭐</span>Subscribe</a></li>
      <li id="navLogin"><a href="login.html" style="color:var(--cyan);background:var(--cyan-dim);border-radius:8px;">Login</a></li>
      <li id="navUser" style="display:none"><a href="#" style="color:var(--text-secondary);font-size:0.8rem;pointer-events:none;"></a></li>
      <li id="navLogout" style="display:none"><a href="#" onclick="logout()" style="color:var(--red);background:var(--red-dim);border-radius:8px;">Logout</a></li>
      <li><button type="button" class="nav-theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><span class="theme-icon">◾</span></button></li>
    </ul>
  </nav>

  <div class="page-wrapper">
    <div class="page-header">
      <h1><span class="highlight">Community</span> Forum</h1>
      <p>Discussions, announcements and city conversations</p>
      <div class="header-line"></div>
    </div>

    <div id="addForumSection" class="glass-card forum-form-card" style="display:none">
      <div class="form-title">Create a Forum Post</div>
      <form id="forumForm">
        <div class="form-grid">
          <div class="form-group" style="grid-column:1/-1">
            <label for="title">Post Title</label>
            <input class="form-control" id="title" placeholder="e.g. New community event this weekend" required>
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label for="content">Content</label>
            <textarea class="form-control" id="content" placeholder="Share details with the community..." required></textarea>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Post to Forum</button>
      </form>
    </div>

    <div class="section-header">
      <h2>All Posts <span class="badge badge-purple" id="postCount">0</span></h2>
      <button id="loadBtn" class="btn btn-secondary">Refresh</button>
    </div>

    <div id="list" class="forum-list">
      <div class="empty-state glass-card">
        <div class="empty-icon">FM</div>
        <p>Click Refresh to load posts</p>
      </div>
    </div>
  </div>

  <footer class="site-footer">Copyright 2025 MySmartCity - Community Forum</footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/forum.js"></script>
  <script>
    applyRoleUI();
    if (isBusiness()) document.getElementById("addForumSection").style.display = "";
  </script>

</body>
</html>
