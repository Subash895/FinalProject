<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySmartCity — Cities</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/city.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="brand-icon">🏙️</div>
      My<span>Smart</span>City
    </a>
    <ul class="navbar-nav">
      <li><a href="city.html" class="active"><span class="nav-icon">🏛️</span>Cities</a></li>
      <li><a href="business.html"><span class="nav-icon">💼</span>Business</a></li>
      <li><a href="place.html"><span class="nav-icon">📍</span>Places</a></li>
      <li><a href="forum.html"><span class="nav-icon">💬</span>Forum</a></li>
      <li><a href="news.html"><span class="nav-icon">📰</span>News</a></li>
      <li><a href="subscription.html"><span class="nav-icon">⭐</span>Subscribe</a></li>
      <li id="navLogin"><a href="login.html" style="color:var(--cyan);background:var(--cyan-dim);border-radius:8px;">Login</a></li>
      <li id="navUser" style="display:none"><a href="#" style="color:var(--text-secondary);font-size:0.8rem;pointer-events:none;"></a></li>
      <li id="navLogout" style="display:none"><a href="#" onclick="logout()" style="color:var(--red);background:var(--red-dim);border-radius:8px;">Logout</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">

    <div class="page-header">
      <h1><span class="highlight">City</span> Directory</h1>
      <p>Browse cities in the SmartCity network</p>
      <div class="header-line"></div>
    </div>

    <!-- ── Add City Form — ADMIN only ────────────────────────── -->
    <div id="addCitySection" class="glass-card city-form-card" style="display:none">
      <div class="form-title">🏛️ Add a City</div>
      <form id="cityForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="name">City Name</label>
            <input class="form-control" id="name" placeholder="e.g. Bengaluru" required>
          </div>
          <div class="form-group">
            <label for="country">Country</label>
            <input class="form-control" id="country" placeholder="e.g. India" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Add City</button>
      </form>
    </div>

    <div class="section-header">
      <h2>All Cities</h2>
      <button id="loadBtn" class="btn btn-secondary">🔄 Refresh</button>
    </div>

    <div id="list" class="card-list">
      <div class="empty-state glass-card">
        <div class="empty-icon">🏛️</div>
        <p>Click Refresh to load cities</p>
      </div>
    </div>

  </div>

  <footer class="site-footer">© 2025 MySmartCity · City Directory</footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/city.js"></script>
  <script>
    applyRoleUI();
    if (isAdmin()) document.getElementById("addCitySection").style.display = "";
  </script>

</body>
</html>
