<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("smartcity.theme") || "dark";
        document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <title>MySmartCity - City Details</title>
  <link rel="icon" type="image/x-icon" href="images/subash.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/city-view.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><div class="brand-icon">SC</div>My<span>Smart</span>City</a>
    <ul class="navbar-nav">
      <li><a href="city.html" class="active"><span class="nav-icon">🏛️</span>Cities</a></li>
      <li id="navLogin"><a href="login.html" style="color:var(--cyan);background:var(--cyan-dim);border-radius:8px;">Login</a></li>
      <li id="navUser" style="display:none"><a href="#" style="color:var(--text-secondary);font-size:0.8rem;pointer-events:none;"></a></li>
      <li id="navLogout" style="display:none"><a href="#" onclick="logout()" style="color:var(--red);background:var(--red-dim);border-radius:8px;">Logout</a></li>
      <li><button type="button" class="nav-theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><span class="theme-icon">&#9728;</span></button></li>
    </ul>
  </nav>

  <main class="page-wrapper">
    <section class="page-header">
      <h1 id="cityTitle">City</h1>
      <p id="cityMeta">Loading...</p>
      <div class="header-line"></div>
    </section>

    <section class="glass-card detail-hero">
      <img id="cityImage" class="detail-image" alt="City image">
      <div>
        <h2>City Overview</h2>
        <p id="cityOverview">Loading city details...</p>
        <div class="hero-actions">
          <a href="city.html" class="btn btn-secondary">Back to Cities</a>
        </div>
      </div>
    </section>

    <section class="glass-card">
      <div class="section-header">
        <h2>City Gallery</h2>
      </div>
      <div id="cityGalleryAdmin" class="city-gallery-admin" style="display:none">
        <button type="button" class="btn btn-secondary btn-sm" onclick="triggerCityGalleryPicker()">Add Image</button>
        <input id="cityGalleryInput" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.bmp,.svg,.ico,.tif,.tiff,image/*" hidden onchange="handleCityGallerySelected(event)">
      </div>
      <div id="cityGalleryList" class="city-gallery-grid"></div>
    </section>

    <section class="glass-card">
      <div class="section-header"><h2>City History</h2></div>
      <div id="cityHistoryList" class="history-list"></div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/city-view.js"></script>
</body>
</html>
