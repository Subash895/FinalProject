# Spring Boot Configuration
spring.application.name=smartcity-minimal
server.port=${PORT:8080}
spring.config.import=optional:file:.env[.properties]

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}
spring.jpa.open-in-view=false

app.auth.google-client-id=${APP_AUTH_GOOGLE_CLIENT_ID:}
app.maps.google-api-key=${APP_MAPS_GOOGLE_API_KEY:}
app.jwt.secret=${APP_JWT_SECRET:change-this-jwt-secret-before-production-use-1234567890}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
