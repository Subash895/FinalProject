<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySmartCity — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-page">

    <a href="index.html" class="auth-logo">
      <div class="logo-icon">🏙️</div>
      My<span>Smart</span>City
    </a>

    <div class="auth-card glass-card">
      <div class="auth-card-header">
        <div class="auth-icon">🔐</div>
        <h1>Welcome back</h1>
        <p>Sign in to your city account</p>
      </div>

      <div id="loginError" class="auth-error"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username">Email Address</label>
          <input class="form-control" id="username" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="form-control" id="password" type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Sign In →</button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>

  </div>

  <script src="js/api.js"></script> 
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const errEl = document.getElementById("loginError");
      errEl.classList.remove("show");
      loginUser(
        document.getElementById("username").value,
        document.getElementById("password").value
      ).catch(() => {
        errEl.textContent = "Invalid credentials. Please try again.";
        errEl.classList.add("show");
      });
    });
  </script>

</body>
</html>
