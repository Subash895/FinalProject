<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySmartCity — Register</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-page">

    <a href="index.html" class="auth-logo">
      <div class="logo-icon">🏙️</div>
      My<span>Smart</span>City
    </a>

    <div class="auth-card glass-card">
      <div class="auth-card-header">
        <div class="auth-icon">🚀</div>
        <h1>Join SmartCity</h1>
        <p>Create your free account today</p>
      </div>

      <div id="registerError" class="auth-error"></div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input class="form-control" id="name" type="text" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input class="form-control" id="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="form-control" id="password" type="password" placeholder="Min. 8 characters" required>
        </div>
        <button type="submit" class="btn-submit">Create Account →</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const errEl = document.getElementById("registerError");
      errEl.classList.remove("show");
      registerUser(
        document.getElementById("name").value,
        document.getElementById("email").value,
        document.getElementById("password").value
      ).catch(() => {
        errEl.textContent = "Registration failed. Please try again.";
        errEl.classList.add("show");
      });
    });
  </script>

</body>
</html>
